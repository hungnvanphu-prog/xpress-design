version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
      - cms
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost/api
        NEXT_PUBLIC_CMS_URL: http://localhost:1337
    container_name: frontend
    restart: always
    environment:
      - NODE_ENV=production
      - INTERNAL_API_URL=http://backend:4000/api
      - INTERNAL_CMS_URL=http://cms:1337
    expose:
      - "3000"
    depends_on:
      - backend
      - cms

  backend:
    build: ./backend
    container_name: backend
    restart: always
    env_file:
      - .env
    expose:
      - "4000"
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  cms:
    build: ./cms
    container_name: cms
    restart: always
    env_file:
      - .env
    environment:
      - PORT=1337
    expose:
      - "1337"
    ports:
      - "1337:1337"
    volumes:
      - cms_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  cms_uploads: