# Production: domain chính = frontend + API, subdomain = Strapi (admin + /api, /upload).
#
# Bước deploy:
# 1. Thay example.com / cms.example.com bên dưới bằng domain thật (chỉ hostname, không có https://).
# 2. DNS: A/AAAA của example.com và cms.example.com → IP server.
# 3. Thêm HTTPS: Certbot hoặc TLS ở load balancer — bổ sung server { listen 443 ssl; ... } khi có chứng chỉ.
#
# .env khi build/run với docker-compose.prod.yml:
#   NEXT_PUBLIC_API_URL=https://example.com/api
#   NEXT_PUBLIC_CMS_URL=https://cms.example.com
#   CMS_PUBLIC_URL=https://cms.example.com

events {}

http {
  server {
    listen 80;
    server_name example.com www.example.com;

    location / {
      proxy_pass http://frontend:3000;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://backend:4000/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  server {
    listen 80;
    server_name cms.example.com;

    location / {
      proxy_pass http://cms:1337;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
